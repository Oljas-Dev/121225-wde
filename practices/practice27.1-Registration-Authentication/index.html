<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Practice 27.1</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <form id="regForm">
        <div class="inputs">
          <div class="input-block">
            <label for="usernameForm">Name <span>*</span></label>
            <input type="text" id="usernameFormReg" placeholder="Your name" />
          </div>
          <div class="input-block">
            <label for="phoneForm">Telephone <span>*</span></label>
            <input type="tel" id="phoneFormReg" placeholder="Your telephone" />
          </div>
          <div class="input-block">
            <label for="emailFormReg">Email <span>*</span></label>
            <input type="email" id="emailFormReg" placeholder="Your email" />
          </div>
          <div class="input-block">
            <label for="passwordFormReg">Password <span>*</span></label>
            <input
              type="password"
              id="passwordFormReg"
              placeholder="Your password"
            />
          </div>
        </div>
        <button type="submit">sign up</button>
      </form>
      <form id="authForm">
        <div class="inputs">
          <div class="input-block">
            <label for="emailFormAuth">Email <span>*</span></label>
            <input
              type="email"
              id="emailFormAuth"
              required
              placeholder="Your email"
            />
          </div>
          <div class="input-block">
            <label for="passwordFormAuth">Password <span>*</span></label>
            <input
              type="password"
              id="passwordFormAuth"
              required
              placeholder="Your password"
            />
          </div>
        </div>
        <button type="submit">sign in</button>
      </form>
      <p id="message"></p>
    </div>
    <script src="main.js"></script>
  </body>
</html>
