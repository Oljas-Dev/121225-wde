<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Practice 32.2</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Todo List</h1>

    <div class="container" id="container">
      <form class="form" id="form">
        <input
          type="text"
          id="enterTask"
          class="form__input"
          placeholder="Enter your task"
          required
        />
        <button type="submit" class="form__button">+</button>
        <button class="get-all-btn" id="getAllBtn">getAllTasks</button>
      </form>

      <!-- Here we'll render todos -->
      <div id="todoList"></div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
