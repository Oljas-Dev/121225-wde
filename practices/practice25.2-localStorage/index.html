<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Практика 25.2</title>
  </head>
  <body>
    <!-- Переключение значения в localStorage -->
    <div class="example-1">
      <h2>Пример работы с localStorage</h2>
      <!-- Здесь будем показывать значение из localStorage -->
      <p>Текущее значение: <span id="status"></span></p>
      <!-- Кнопка, которая будет изменять значение -->
      <button id="toggleButton">Изменить значение</button>
    </div>
    <form id="textForm">
      <label for="textInput">Type your text</label>
      <input type="text" id="textInput" placeholder="your text" />
      <button type="submit" id="formBtn">Save changes</button>
    </form>

    <button id="getTextFromLS">get localStorage</button>
    <script src="main.js"></script>
  </body>
</html>
